<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>野外ファーストエイド 会話練習 / Wilderness First Aid Practice</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1f2937;
    --sub: #6b7280;
    --line: #e5e7eb;
    --user: #2563eb;
    --runner: #b45309;
    --good: #16a34a;
    --warn: #d97706;
    --bad: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
      "Yu Gothic UI", Meiryo, "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; padding: 8px 4px 16px;
  }
  h1 { font-size: 1.1rem; margin: 0; }
  .sub { color: var(--sub); font-size: 0.85rem; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font: inherit; border: 1px solid var(--line); background: #fff; color: var(--ink);
    border-radius: 8px; padding: 8px 12px; cursor: pointer;
  }
  button:hover { background: #f9fafb; }
  button.primary { background: var(--user); color: #fff; border-color: var(--user); }
  button.primary:hover { background: #1d4ed8; }
  button.ghost { background: transparent; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px; font-size: 0.8rem;
    border: 1px solid var(--line); background: #fff;
  }
  .pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 14px;
  }
  .scenarios { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 10px; }
  .scen {
    text-align: left; padding: 14px; border-radius: 10px; border: 1px solid var(--line);
    background: #fff; cursor: pointer;
  }
  .scen:hover { border-color: var(--user); }
  .scen h3 { margin: 0 0 4px; font-size: 1rem; }
  .scen p { margin: 0; color: var(--sub); font-size: 0.85rem; }

  .turn { margin-bottom: 10px; display: flex; gap: 10px; }
  .turn .bubble {
    border-radius: 12px; padding: 10px 12px; max-width: 80%;
    border: 1px solid var(--line); background: #fff;
  }
  .turn.runner { justify-content: flex-start; }
  .turn.runner .bubble { background: #fff7ed; border-color: #fed7aa; }
  .turn.user { justify-content: flex-end; }
  .turn.user .bubble { background: #eff6ff; border-color: #bfdbfe; }
  .tr {
    color: var(--sub); font-size: 0.85rem; margin-top: 6px;
    border-top: 1px dashed var(--line); padding-top: 4px;
  }
  .who { font-size: 0.75rem; color: var(--sub); margin-bottom: 2px; }
  .target { font-size: 1.05rem; }
  .heard { font-size: 0.9rem; color: var(--sub); margin-top: 4px; min-height: 1.2em; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .score {
    font-weight: 700; padding: 2px 8px; border-radius: 999px;
    background: #f3f4f6; color: var(--sub); font-size: 0.85rem;
  }
  .score.good { background: #dcfce7; color: var(--good); }
  .score.mid  { background: #fef3c7; color: var(--warn); }
  .score.bad  { background: #fee2e2; color: var(--bad);  }

  .mic {
    width: 64px; height: 64px; border-radius: 50%; border: none;
    background: var(--user); color: #fff; font-size: 1.6rem; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(37,99,235,0.35);
  }
  .mic.rec { background: var(--bad); animation: pulse 1s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
    70% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  }
  .controls {
    display: flex; gap: 10px; align-items: center; justify-content: center;
    flex-wrap: wrap; padding: 8px 0 4px;
  }
  .note { color: var(--sub); font-size: 0.8rem; }
  .diff .ok  { color: var(--good); }
  .diff .miss { color: var(--bad); text-decoration: underline wavy var(--bad); }
  footer { color: var(--sub); font-size: 0.8rem; text-align: center; padding: 18px 0; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>野外ファーストエイド 会話練習</h1>
      <div class="sub">Wilderness First Aid · レスキュースタッフ（あなた）↔ ケガをしたランナー</div>
    </div>
    <div class="toolbar">
      <button id="langBtn" class="pill active" title="言語切替">EN ↔ 中文</button>
      <span id="langLabel" class="pill">English</span>
      <button id="trBtn" class="pill" title="ランナーの和訳表示">訳 OFF</button>
    </div>
  </header>

  <!-- シナリオ選択 -->
  <section id="picker" class="card">
    <h2 style="margin:0 0 8px;font-size:1rem;">シナリオを選んでください</h2>
    <p class="note" style="margin:0 0 12px;">あなたはレスキュースタッフ。ケガをしたランナーに対応します。マイクで発音 → 認識結果で採点します。</p>
    <div class="scenarios">
      <button class="scen" data-scen="sprain">
        <h3>① 足首の捻挫</h3>
        <p>Ankle sprain · 扭到脚踝</p>
      </button>
      <button class="scen" data-scen="bleeding">
        <h3>② 出血</h3>
        <p>Bleeding wound · 流血</p>
      </button>
      <button class="scen" data-scen="hypothermia">
        <h3>③ 低体温</h3>
        <p>Hypothermia · 失温</p>
      </button>
      <button class="scen" data-scen="heat">
        <h3>④ 脱水・熱中症</h3>
        <p>Dehydration / Heat illness · 脱水・中暑</p>
      </button>
      <button class="scen" data-scen="transport">
        <h3>⑤ 搬送時の声かけ</h3>
        <p>Transport / evacuation · 搬运・撤离</p>
      </button>
    </div>

    <h3 style="margin:16px 0 8px;font-size:0.95rem;">練習モード</h3>
    <div class="scenarios">
      <button class="scen" data-mode="random">
        <h3>🎲 ランダム1問</h3>
        <p>全シナリオから1問ずつ。連続練習向け。</p>
      </button>
      <button class="scen" data-mode="review">
        <h3>🔁 間違えた所だけ復習</h3>
        <p id="reviewCount">残り 0 問</p>
      </button>
    </div>

    <div style="text-align:right;margin-top:12px;">
      <button id="resetHistoryBtn" class="ghost" style="font-size:0.8rem;color:var(--sub);">
        🗑 練習履歴をリセット
      </button>
    </div>
  </section>

  <!-- 練習画面 -->
  <section id="practice" class="hidden">
    <div class="card" id="convo"></div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="who">あなたのセリフ（レスキュースタッフ）</div>
          <div id="targetText" class="target"></div>
          <div id="targetTr" class="tr" style="display:none;"></div>
          <div id="heard" class="heard"></div>
          <div id="diff" class="diff note" style="margin-top:4px;"></div>
        </div>
        <div style="text-align:right;">
          <div id="scoreBadge" class="score">— %</div>
        </div>
      </div>

      <div class="controls">
        <button id="playTarget" title="お手本（合成音声）を聞く">🔊 お手本</button>
        <button id="micBtn" class="mic" title="マイクで話す">🎤</button>
        <button id="playMine" title="自分の録音を聞く" disabled>▶ あなたの声</button>
        <button id="nextBtn" class="primary" disabled>次へ →</button>
      </div>
      <p class="note" id="status" style="text-align:center;margin:6px 0 0;">マイクを押して話してください</p>
    </div>

    <div class="row" style="justify-content:space-between;">
      <button id="restartBtn" class="ghost">↩ シナリオ選択へ戻る</button>
      <button id="skipBtn" class="ghost">スキップ →</button>
    </div>
  </section>

  <footer>
    Chrome / Edge 推奨 · マイク使用許可が必要です · すべてローカル動作（認識はブラウザの音声API）
  </footer>

</div>

/* =========================================================
   状態
   ========================================================= */
let lang = "en";        // "en" | "zh"
let showTr = false;     // ランナーの和訳を表示するか
let scenario = null;    // "sprain" | "bleeding" | "hypothermia" | "heat" | "transport" | "random" | "review"
let practiceMode = null; // null | "random" | "review"
let turns = [];         // 結合済みターン配列
let idx = 0;
let recognition = null;
let recognizing = false;
// 自分の声の録音（聞き比べ用）
let mediaStream = null;
let mediaRecorder = null;
let mediaChunks = [];
let recordedUrl = null;

const $ = (id) => document.getElementById(id);

/* =========================================================
   言語切替
   ========================================================= */
function setLang(next) {
  lang = next;
  $("langLabel").textContent = lang === "en" ? "English" : "中文 (zh-CN)";
  updateReviewCount();
  if (practiceMode === "random") {
    loadNextRandom();
  } else if (practiceMode === "review") {
    loadNextReview();
  } else if (scenario) {
    startScenario(scenario, idx); // 再構築（位置を保持）
  }
}
$("langBtn").addEventListener("click", () => setLang(lang === "en" ? "zh" : "en"));

/* 和訳トグル */
$("trBtn").addEventListener("click", () => {
  showTr = !showTr;
  $("trBtn").textContent = "訳 " + (showTr ? "ON" : "OFF");
  $("trBtn").classList.toggle("active", showTr);
  if (scenario) render();
});

/* =========================================================
   シナリオ選択
   ========================================================= */
document.querySelectorAll(".scen").forEach(btn => {
  btn.addEventListener("click", () => {
    if (btn.dataset.scen) startScenario(btn.dataset.scen, 0);
    else if (btn.dataset.mode === "random") startRandom();
    else if (btn.dataset.mode === "review") startReview();
  });
});

/* =========================================================
   練習モード（ランダム1問 / 間違えた所だけ復習）
   ========================================================= */
const MISSED_KEY = "famr-ec.missed.v1";

function loadMissed() {
  try { return JSON.parse(localStorage.getItem(MISSED_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveMissed(obj) {
  try { localStorage.setItem(MISSED_KEY, JSON.stringify(obj)); } catch (e) {}
}
function markScoreOnTurn(cur, percent) {
  if (!cur || cur.speaker !== "user" || !cur._scen) return;
  const m = loadMissed();
  const key = `${cur._scen}:${cur._idx}:${lang}`;
  if (percent >= 80) {
    if (m[key]) { delete m[key]; saveMissed(m); }
  } else if (percent < 55) {
    m[key] = { lastScore: percent, ts: Date.now() };
    saveMissed(m);
  }
  updateReviewCount();
}
function updateReviewCount() {
  const el = $("reviewCount");
  if (!el) return;
  const m = loadMissed();
  const n = Object.keys(m).filter(k => k.endsWith(":" + lang)).length;
  el.textContent = `残り ${n} 問（${lang === "en" ? "EN" : "中文"}）`;
}

function getSource(scenName) {
  return scenName === "intro" ? intro[lang] : scripts[scenName][lang];
}
function buildSingleProblem(scenName, internalIdx) {
  const source = getSource(scenName);
  if (!source || !source[internalIdx]) {
    // データが見つからない（言語切替後など）→ スキップ
    if (practiceMode === "review") return loadNextReview();
    if (practiceMode === "random") return loadNextRandom();
    return;
  }
  const userTurn = { ...source[internalIdx], _scen: scenName, _idx: internalIdx };
  const ctx = internalIdx > 0
    ? { ...source[internalIdx - 1], _scen: scenName, _idx: internalIdx - 1 }
    : null;
  turns = ctx ? [ctx, userTurn] : [userTurn];
  idx = turns.length - 1;
  $("picker").classList.add("hidden");
  $("practice").classList.remove("hidden");
  render();
  // コンテキストがランナー発話なら自動再生
  if (ctx && ctx.speaker === "runner") {
    setTimeout(() => speak(ctx.text, lang), 200);
  }
}

function collectAllUserTurns() {
  const list = [];
  intro[lang].forEach((t, i) => {
    if (t.speaker === "user") list.push({ scen: "intro", idx: i });
  });
  for (const [name, def] of Object.entries(scripts)) {
    def[lang].forEach((t, i) => {
      if (t.speaker === "user") list.push({ scen: name, idx: i });
    });
  }
  return list;
}

function startRandom() {
  practiceMode = "random";
  scenario = "random";
  loadNextRandom();
}
function loadNextRandom() {
  const all = collectAllUserTurns();
  if (!all.length) return;
  const pick = all[Math.floor(Math.random() * all.length)];
  buildSingleProblem(pick.scen, pick.idx);
}

function refreshReviewQueue() {
  const m = loadMissed();
  return Object.keys(m)
    .filter(k => k.endsWith(":" + lang))
    .map(k => {
      const parts = k.split(":");
      return { scen: parts[0], idx: parseInt(parts[1], 10) };
    });
}
function startReview() {
  const q = refreshReviewQueue();
  if (!q.length) {
    alert("復習する問題がまだありません。\nシナリオ練習や「ランダム1問」で 55% 未満を取った問題が、ここに溜まっていきます。");
    return;
  }
  practiceMode = "review";
  scenario = "review";
  loadNextReview();
}
function loadNextReview() {
  const q = refreshReviewQueue();
  if (!q.length) {
    // 全マスター → 完了画面
    $("picker").classList.add("hidden");
    $("practice").classList.remove("hidden");
    $("convo").innerHTML = `<div class="card" style="margin:0;text-align:center;">
      🎉 すべての復習を完了しました！</div>`;
    $("targetText").textContent = "";
    $("targetTr").style.display = "none";
    $("heard").textContent = "";
    $("diff").innerHTML = "";
    $("scoreBadge").textContent = "—";
    $("scoreBadge").className = "score";
    $("nextBtn").disabled = true;
    $("micBtn").disabled = true;
    $("playTarget").disabled = true;
    $("status").textContent = "「シナリオ選択へ戻る」で別の練習へ。";
    return;
  }
  const pick = q[Math.floor(Math.random() * q.length)];
  buildSingleProblem(pick.scen, pick.idx);
}

/* 履歴リセット */
$("resetHistoryBtn").addEventListener("click", () => {
  const m = loadMissed();
  const total = Object.keys(m).length;
  const nEn = Object.keys(m).filter(k => k.endsWith(":en")).length;
  const nZh = Object.keys(m).filter(k => k.endsWith(":zh")).length;
  if (total === 0) {
    alert("リセットする履歴はありません。");
    return;
  }
  const ok = confirm(
    `練習履歴を全て削除します。よろしいですか？\n\n` +
    `・英語 (EN)：${nEn} 問\n` +
    `・中国語 (ZH)：${nZh} 問\n` +
    `合計：${total} 件\n\n` +
    `この操作は元に戻せません。`
  );
  if (!ok) return;
  try { localStorage.removeItem(MISSED_KEY); } catch (e) {}
  updateReviewCount();
  alert(`${total} 件の履歴を削除しました。`);
});

/* 起動時に復習件数を更新 */
updateReviewCount();
$("restartBtn").addEventListener("click", () => {
  $("practice").classList.add("hidden");
  $("picker").classList.remove("hidden");
  scenario = null;
  practiceMode = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  stopRec();
  updateReviewCount();
});

function startScenario(name, startIdx) {
  scenario = name;
  practiceMode = null;
  const scen = scripts[name];
  const introTurns = scen.skipIntro
    ? []
    : intro[lang].map((t, i) => ({ ...t, _scen: "intro", _idx: i }));
  const scenTurns = scen[lang].map((t, i) => ({ ...t, _scen: name, _idx: i }));
  turns = [...introTurns, ...scenTurns];
  idx = Math.min(startIdx, turns.length - 1);
  $("picker").classList.add("hidden");
  $("practice").classList.remove("hidden");
  render();
}

/* =========================================================
   描画
   ========================================================= */
function render() {
  resetRecording();
  // 練習モードに応じてボタン表示を調整
  if (practiceMode === "random") {
    $("nextBtn").textContent = "🎲 別の問題 →";
    $("skipBtn").style.display = "none";
  } else if (practiceMode === "review") {
    const remaining = refreshReviewQueue().length;
    $("nextBtn").textContent = `→ 次の復習（残り ${remaining}）`;
    $("skipBtn").style.display = "none";
  } else {
    $("nextBtn").textContent = "次へ →";
    $("skipBtn").style.display = "";
  }
  const convo = $("convo");
  convo.innerHTML = "";

  // 既出ターンの履歴表示（現在のターンより前のみ）
  for (let i = 0; i < idx; i++) {
    convo.appendChild(renderBubble(turns[i]));
  }

  if (idx >= turns.length) {
    convo.innerHTML += `<div class="card" style="margin:0;text-align:center;">
      ✅ シナリオ完了！お疲れさまでした。</div>`;
    $("targetText").textContent = "";
    $("targetTr").style.display = "none";
    $("heard").textContent = "";
    $("diff").innerHTML = "";
    $("scoreBadge").textContent = "—";
    $("scoreBadge").className = "score";
    $("nextBtn").disabled = true;
    $("micBtn").disabled = true;
    $("playTarget").disabled = true;
    $("status").textContent = "「シナリオ選択へ戻る」で別のシナリオを練習できます。";
    return;
  }

  const cur = turns[idx];

  if (cur.speaker === "runner") {
    // ランナーのセリフはこちらで読み上げ、Nextボタンで進む
    convo.appendChild(renderBubble(cur));

    $("targetText").textContent = "（ランナーの発話を聞いてください）";
    $("targetTr").style.display = "none";
    $("heard").textContent = "";
    $("diff").innerHTML = "";
    $("scoreBadge").textContent = "—";
    $("scoreBadge").className = "score";
    $("nextBtn").disabled = false;
    $("micBtn").disabled = true;
    $("playTarget").disabled = false;
    $("playTarget").textContent = "🔊 もう一度聞く";
    $("status").textContent = "「お手本」で聞き直し、準備ができたら「次へ」。";

    // 自動再生
    speak(cur.text, lang);
  } else {
    // 自分のターン
    $("targetText").textContent = cur.text;
    const trEl = $("targetTr");
    if (showTr && cur.ja) {
      trEl.textContent = cur.ja;
      trEl.style.display = "block";
    } else {
      trEl.style.display = "none";
    }
    $("heard").textContent = "";
    $("diff").innerHTML = "";
    $("scoreBadge").textContent = "— %";
    $("scoreBadge").className = "score";
    $("nextBtn").disabled = true;
    $("micBtn").disabled = false;
    $("playTarget").disabled = false;
    $("playTarget").textContent = "🔊 お手本";
    $("status").textContent = "マイクを押して話してください";
  }
}

/* 吹き出し1つを生成（runner は和訳を任意表示） */
function renderBubble(t) {
  const div = document.createElement("div");
  div.className = "turn " + t.speaker;
  const who = t.speaker === "runner" ? "🏃 ランナー" : "🚑 あなた";
  const tr = (showTr && t.ja)
    ? `<div class="tr">${escapeHTML(t.ja)}</div>` : "";
  div.innerHTML = `<div class="bubble">
      <div class="who">${who}</div>
      <div>${escapeHTML(t.text)}</div>
      ${tr}
    </div>`;
  return div;
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

$("nextBtn").addEventListener("click", () => {
  if (practiceMode === "random") return loadNextRandom();
  if (practiceMode === "review") return loadNextReview();
  idx++; render();
});
$("skipBtn").addEventListener("click", () => {
  if (practiceMode === "random") return loadNextRandom();
  if (practiceMode === "review") return loadNextReview();
  idx++; render();
});

/* =========================================================
   TTS（お手本）
   ========================================================= */
$("playTarget").addEventListener("click", () => {
  const cur = turns[idx];
  if (!cur) return;
  speak(cur.text, lang);
});

function speak(text, lng) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lng === "en" ? "en-US" : "zh-CN";
  u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

/* =========================================================
   音声認識
   ========================================================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  $("status").textContent = "このブラウザは音声認識に対応していません。Chrome / Edge をお使いください。";
  $("micBtn").disabled = true;
}

$("micBtn").addEventListener("click", () => {
  if (recognizing) { stopRec(); return; }
  startRec();
});

async function startRec() {
  if (!SR) return;

  // 1) MediaRecorder で自分の声をブラウザ内に録音（聞き比べ用、ベストエフォート）
  try {
    if (!mediaStream || mediaStream.getTracks().some(t => t.readyState === "ended")) {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }
    mediaChunks = [];
    mediaRecorder = new MediaRecorder(mediaStream);
    mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) mediaChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (!mediaChunks.length) return;
      if (recordedUrl) URL.revokeObjectURL(recordedUrl);
      const blob = new Blob(mediaChunks, { type: mediaRecorder.mimeType || "audio/webm" });
      recordedUrl = URL.createObjectURL(blob);
      $("playMine").disabled = false;
    };
    mediaRecorder.start();
  } catch (e) {
    // 録音はあくまでオプション。失敗しても音声認識は続行
    console.warn("録音は使用できません:", e);
  }

  // 2) 音声認識
  recognition = new SR();
  recognition.lang = lang === "en" ? "en-US" : "zh-CN";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.continuous = false;

  recognition.onstart = () => {
    recognizing = true;
    $("micBtn").classList.add("rec");
    $("status").textContent = "🎙 録音中… 終わったらマイクをもう一度押してください";
  };
  recognition.onerror = (e) => {
    $("status").textContent = "エラー: " + e.error + "（マイク許可と接続を確認してください）";
  };
  recognition.onend = () => {
    recognizing = false;
    $("micBtn").classList.remove("rec");
    if (mediaRecorder && mediaRecorder.state === "recording") {
      try { mediaRecorder.stop(); } catch(_) {}
    }
  };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    handleTranscript(transcript);
  };

  try { recognition.start(); }
  catch (err) { $("status").textContent = "開始に失敗: " + err.message; }
}

function stopRec() {
  if (recognition && recognizing) {
    try { recognition.stop(); } catch(_) {}
  }
  // mediaRecorder は recognition.onend で停止
}

/* 自分の声を再生 */
$("playMine").addEventListener("click", () => {
  if (!recordedUrl) return;
  window.speechSynthesis && window.speechSynthesis.cancel();
  const a = new Audio(recordedUrl);
  a.play().catch(err => $("status").textContent = "再生に失敗: " + err.message);
});

/* ターンが変わったら録音をリセット */
function resetRecording() {
  if (recordedUrl) { URL.revokeObjectURL(recordedUrl); recordedUrl = null; }
  mediaChunks = [];
  $("playMine").disabled = true;
}

/* =========================================================
   スコアリング
   ========================================================= */
function handleTranscript(transcript) {
  const cur = turns[idx];
  if (!cur || cur.speaker !== "user") return;
  $("heard").textContent = "認識結果: " + transcript;

  const result = score(cur.text, transcript, lang);
  const badge = $("scoreBadge");
  badge.textContent = result.percent + " %";
  badge.className = "score " + (result.percent >= 80 ? "good" : result.percent >= 55 ? "mid" : "bad");

  $("diff").innerHTML = result.diffHTML;
  $("nextBtn").disabled = result.percent < 55; // ある程度言えたら次へ進める
  $("status").textContent =
    result.percent >= 80 ? "👍 とても良いです！" + (practiceMode === "review" ? "復習リストから削除します。" : "「次へ」で進みましょう。") :
    result.percent >= 55 ? "もう少しで完璧。もう一度言ってみても、進んでもOKです。" :
                           "発音が認識されにくかったようです。もう一度試してみましょう。";

  // 間違い／マスター記録（練習モード問わず）
  markScoreOnTurn(cur, result.percent);
}

/* 採点：英語は単語単位、中国語は文字単位（句読点除去） */
function score(target, heard, lng) {
  if (lng === "en") {
    const t = normalizeEn(target);
    const h = normalizeEn(heard);
    const tWords = t.split(/\s+/).filter(Boolean);
    const hSet = new Set(h.split(/\s+/).filter(Boolean));
    let matched = 0;
    const diff = tWords.map(w => {
      if (hSet.has(w)) { matched++; return `<span class="ok">${escapeHTML(w)}</span>`; }
      return `<span class="miss">${escapeHTML(w)}</span>`;
    }).join(" ");
    const percent = Math.round((matched / Math.max(1, tWords.length)) * 100);
    return { percent, diffHTML: "差分: " + diff };
  } else {
    const t = normalizeZh(target);
    const h = normalizeZh(heard);
    const hSet = new Set([...h]);
    let matched = 0;
    let diff = "";
    for (const ch of t) {
      if (hSet.has(ch)) { matched++; diff += `<span class="ok">${ch}</span>`; }
      else              { diff += `<span class="miss">${ch}</span>`; }
    }
    const percent = Math.round((matched / Math.max(1, [...t].length)) * 100);
    return { percent, diffHTML: "差分: " + diff };
  }
}
function normalizeEn(s) {
  return s.toLowerCase().replace(/[.,!?;:"'’“”\-—()]/g, " ").replace(/\s+/g, " ").trim();
}
function normalizeZh(s) {
  return s.replace(/[\s。，！？、；：「」『』（）(),.!?;:"'’“”\-—]/g, "");
}
